<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#101218">
<title>APEX — Deviens ta meilleure version</title>
<style>
/* ============================================================
   APEX — design calmé, lisible, ludique (Apex Legends × Duolingo)
   ============================================================ */
:root{
  --bg:#101218;
  --bg2:#161922;
  --panel:#1C2029;
  --panel2:#242935;
  --panel3:#2D3340;
  --line:rgba(255,255,255,.07);
  --line2:rgba(255,255,255,.13);
  --text:#ECEFF5;
  --muted:#9AA1B2;
  --muted2:#646b7d;
  --accent:#FF7A29;          /* orange chaud, moins agressif */
  --accent2:#FFB36B;
  --red:#DA292A;             /* rouge Apex, en accent rare */
  --cyan:#3FD0E0;            /* œil de NOVA */
  --phys:#FF7A29;
  --mental:#9B7BFF;
  --intel:#3FC9E0;
  --sante:#43D9A3;
  --good:#43D9A3;
  --glow:0 8px 30px rgba(255,122,41,.28);
  --radius:18px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,Roboto,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--font);color:var(--text);
  background:var(--bg);
  background-image:radial-gradient(120% 80% at 50% -10%, #1a1e2a 0%, var(--bg) 55%);
  background-attachment:fixed;-webkit-font-smoothing:antialiased;overscroll-behavior:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}

#frame{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}

/* ---------- top bar : barre continue + retour ---------- */
.topbar{display:flex;align-items:center;gap:14px;padding:18px 20px 6px}
.backbtn{width:30px;height:30px;flex:none;display:grid;place-items:center;border-radius:50%;color:var(--muted);font-size:22px;background:var(--panel)}
.backbtn:active{transform:scale(.9)}
.backbtn.hide{visibility:hidden}
.pbar{flex:1;height:9px;border-radius:6px;background:var(--panel2);overflow:hidden}
.pbar > i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s cubic-bezier(.22,1,.36,1)}

/* ---------- zone écran + transitions ---------- */
.stage{flex:1;display:flex;flex-direction:column;padding:16px 24px 0}
.enter-right{animation:enterR .42s cubic-bezier(.22,1.1,.36,1)}
.enter-left{animation:enterL .42s cubic-bezier(.22,1.1,.36,1)}
@keyframes enterR{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:none}}
@keyframes enterL{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:none}}

h1.q{font-size:25px;line-height:1.18;font-weight:850;letter-spacing:-.01em;margin:0 0 8px}
h1.q .hl{color:var(--accent2)}
.sub{color:var(--muted);font-size:14.5px;line-height:1.5;margin:0 0 20px}
.kick{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--accent2);font-weight:800;margin-bottom:12px}

/* ---------- footer CTA ---------- */
.footer{position:sticky;bottom:0;padding:18px 24px calc(20px + env(safe-area-inset-bottom));background:linear-gradient(180deg,transparent,var(--bg) 30%)}
.cta{width:100%;padding:17px;font-weight:850;font-size:16px;letter-spacing:.03em;color:#fff;background:linear-gradient(135deg,var(--accent),#ff5e1a);border-radius:16px;box-shadow:var(--glow);transition:transform .12s,box-shadow .2s,opacity .2s}
.cta:active{transform:translateY(2px) scale(.99)}
.cta:disabled{opacity:.4;box-shadow:none;filter:grayscale(.5)}
.skip{display:block;width:100%;text-align:center;color:var(--muted2);font-weight:700;font-size:13px;padding:13px 0 2px}

/* ---------- NOVA bulle (écrans question) ---------- */
.novabar{display:flex;gap:12px;align-items:flex-end;margin-bottom:18px}
.novabar .mini{width:64px;height:64px;flex:none}
.novabar .bubble{flex:1}
.bubble{background:var(--panel);border:1px solid var(--line2);border-radius:18px 18px 18px 4px;padding:13px 16px;font-size:15.5px;line-height:1.42;font-weight:650;animation:bub .3s ease}
@keyframes bub{from{opacity:0;transform:translateY(6px) scale(.97)}to{opacity:1;transform:none}}

/* ---------- options ---------- */
.opts{display:flex;flex-direction:column;gap:12px}
.opt{display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;background:var(--panel);border:2px solid transparent;box-shadow:inset 0 0 0 1px var(--line);text-align:left;transition:.13s;width:100%}
.opt:active{transform:scale(.985)}
.opt .oi{width:40px;height:40px;flex:none;display:grid;place-items:center;font-size:21px;border-radius:11px;background:var(--panel2)}
.opt .ol{font-weight:750;font-size:15.5px}
.opt .od{font-size:12.5px;color:var(--muted);margin-top:2px}
.opt .ock{margin-left:auto;width:24px;height:24px;border-radius:50%;border:2px solid var(--line2);flex:none;display:grid;place-items:center;color:#fff;font-size:14px;transition:.13s}
.opt.sel{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent),0 6px 20px rgba(255,122,41,.18);background:linear-gradient(135deg,rgba(255,122,41,.12),rgba(255,122,41,.03))}
.opt.sel .ock{background:var(--accent);border-color:var(--accent)}
.opt.sel .oi{background:rgba(255,122,41,.16)}
.opt.pop{animation:pop .32s cubic-bezier(.2,1.5,.4,1)}
@keyframes pop{0%{transform:scale(.985)}45%{transform:scale(1.025)}100%{transform:scale(1)}}
.daygrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.daygrid .opt{justify-content:center;padding:16px 4px;flex-direction:column;gap:0}

/* ---------- binaire ---------- */
.binary{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px}
.bopt{padding:24px 0;border-radius:16px;background:var(--panel);box-shadow:inset 0 0 0 1px var(--line);font-weight:800;font-size:16px;display:flex;flex-direction:column;align-items:center;gap:10px;transition:.13s;border:2px solid transparent}
.bopt:active{transform:scale(.98)}
.bopt .bi{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;border:2px solid var(--line2);font-size:19px}
.bopt.sel.yes{border-color:var(--good);background:rgba(67,217,163,.1)}
.bopt.sel.yes .bi{border-color:var(--good);background:var(--good);color:#06281b}
.bopt.sel.no{border-color:var(--muted);background:rgba(255,255,255,.04)}
.bopt.sel.no .bi{border-color:var(--muted);background:var(--muted);color:#16181f}

/* ---------- texte ---------- */
.tinput{width:100%;background:var(--panel);box-shadow:inset 0 0 0 1px var(--line2);border:none;border-radius:16px;padding:18px;color:var(--text);font-size:20px;font-weight:800;outline:none}
.tinput:focus{box-shadow:inset 0 0 0 2px var(--accent)}

/* ---------- nombre ---------- */
.numwrap{display:flex;flex-direction:column;align-items:center;gap:20px;margin:30px 0}
.numbig{font-size:62px;font-weight:850;letter-spacing:-.03em;display:flex;align-items:baseline;gap:8px}
.numbig small{font-size:19px;color:var(--muted);font-weight:700}
.numrow{display:flex;align-items:center;gap:20px;width:100%}
.nbtn{width:54px;height:54px;flex:none;border-radius:50%;background:var(--panel);box-shadow:inset 0 0 0 1px var(--line2);font-size:26px;display:grid;place-items:center;color:var(--accent2)}
.nbtn:active{transform:scale(.9);background:var(--panel2)}
.range{-webkit-appearance:none;flex:1;height:8px;border-radius:4px;background:var(--panel2);outline:none}
.range::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--accent);box-shadow:0 2px 10px rgba(255,122,41,.5);cursor:pointer;border:3px solid #fff2}

/* ---------- échelle ---------- */
.scaleVal{text-align:center;margin:24px 0 14px}
.scaleVal b{font-size:40px;font-weight:850}
.scaleVal small{display:block;font-size:13px;color:var(--accent2);font-weight:800;margin-top:6px;text-transform:uppercase;letter-spacing:.08em}
.scaleEnds{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:12px;font-weight:600}

/* ---------- pitch / illus ---------- */
.center{flex:1;display:flex;flex-direction:column;justify-content:center}
.middle{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.pitchArt{margin:8px 0 4px;display:grid;place-items:center}
.axgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;width:100%}
.axcard{padding:18px 15px;border-radius:16px;background:var(--panel);box-shadow:inset 0 0 0 1px var(--line);border-top:3px solid var(--c)}
.axcard .ae{font-size:30px}
.axcard .an{font-weight:800;font-size:15px;margin-top:8px}
.axcard .ad{font-size:11.5px;color:var(--muted);margin-top:3px}
.tline{display:flex;flex-direction:column;gap:11px;width:100%}
.trow{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--panel);border-radius:14px;box-shadow:inset 0 0 0 1px var(--line);border-left:3px solid var(--accent)}
.trow .tt{font-weight:800}.trow .ts{font-size:12px;color:var(--muted)}
.ladder{display:flex;flex-direction:column;gap:8px;width:100%}
.lrow{display:flex;align-items:center;gap:13px;padding:11px 15px;border-radius:13px;background:var(--panel);box-shadow:inset 0 0 0 1px var(--line)}
.lrow .lh{width:26px;height:30px;flex:none}.lrow .ln{font-weight:800;font-size:14px;flex:1}.lrow .lp{font-size:11px;color:var(--muted)}

/* testimonial */
.testi{background:var(--panel);border-radius:18px;box-shadow:inset 0 0 0 1px var(--line);padding:20px;margin-top:8px}
.testi .stars{color:#FFC53D;font-size:16px;letter-spacing:2px}
.testi .tx{font-size:15px;line-height:1.5;margin:12px 0;font-weight:600}
.testi .who{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;font-weight:700}
.testi .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--red))}

/* hold-to-confirm */
.holdwrap{display:flex;flex-direction:column;align-items:center;gap:18px;margin:24px 0}
.holdbtn{position:relative;width:150px;height:150px;display:grid;place-items:center}
.holdbtn svg{position:absolute;inset:0;transform:rotate(-90deg)}
.holdbtn .ring-bg{fill:none;stroke:var(--panel2);stroke-width:8}
.holdbtn .ring-fg{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;stroke-dasharray:440;stroke-dashoffset:440}
.holdbtn.holding .ring-fg{transition:stroke-dashoffset 1.1s linear;stroke-dashoffset:0}
.holdbtn .core{width:120px;height:120px;border-radius:50%;background:var(--panel);box-shadow:inset 0 0 0 1px var(--line2);display:grid;place-items:center;text-align:center;font-weight:800;font-size:13px;padding:0 18px;color:var(--muted)}
.holdbtn.holding .core{color:var(--text)}
.holdhint{font-size:12px;color:var(--muted2);font-weight:700}

/* avatar */
.avgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;margin-top:6px}
.avopt{padding:8px;border-radius:14px;background:var(--panel);box-shadow:inset 0 0 0 1px var(--line);transition:.13s}
.avopt.sel{box-shadow:inset 0 0 0 2px var(--accent),0 6px 20px rgba(255,122,41,.25)}
.avopt:active{transform:scale(.96)}
.avopt svg{width:100%;display:block}
.accents{display:flex;gap:15px;justify-content:center;margin:34px 0}
.acc{width:48px;height:48px;border-radius:50%;border:3px solid transparent;transition:.13s;position:relative}
.acc.sel{border-color:#fff;transform:scale(1.12)}
.acc.sel::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-weight:900;text-shadow:0 1px 3px #0008}

/* projection */
.projbox{background:var(--panel);border-radius:18px;box-shadow:inset 0 0 0 1px var(--line);padding:18px;margin:8px 0}
.projbox .pl{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:700;margin-top:8px}

/* loading */
.loadwrap{display:flex;flex-direction:column;gap:22px;margin-top:24px}
.loadrow .lt{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;margin-bottom:9px}
.loadrow .lt b{color:var(--accent2)}
.lbar{height:9px;border-radius:5px;background:var(--panel2);overflow:hidden}
.lbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s linear}

/* reveal */
.indice{font-size:58px;font-weight:850;line-height:1;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.axranks{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:22px 0}
.arc{display:flex;align-items:center;gap:11px;padding:13px;border-radius:14px;background:var(--panel);box-shadow:inset 0 0 0 1px var(--line)}
.arc .ae{font-size:22px}.arc .an{font-size:12px;color:var(--muted);font-weight:700}.arc .ar{font-weight:850;font-size:14px}
.confetti{position:fixed;top:-12px;width:9px;height:15px;border-radius:2px;z-index:60;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(680deg);opacity:0}}

/* NOVA mascotte : flottement + clignement */
.nova-float{animation:floaty 3.4s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.nova-shadow{animation:shad 3.4s ease-in-out infinite}
@keyframes shad{0%,100%{transform:scaleX(1);opacity:.32}50%{transform:scaleX(.82);opacity:.2}}
.nova-blink{animation:blink 4.2s ease-in-out infinite}
@keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}
.spark{animation:spark 1.3s ease-in-out infinite}
@keyframes spark{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}

/* ============================================================
   HUB provisoire
   ============================================================ */
.hub{padding:20px 20px 44px}
.hubhead{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.hubAv{width:66px;height:72px;flex:none}
.hubName{font-size:21px;font-weight:850}
.hubMeta{font-size:12.5px;color:var(--muted);margin-top:3px}
.hbadge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:var(--panel);box-shadow:inset 0 0 0 1px var(--line2);font-size:12px;font-weight:800}
.axisbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px}
.axb{padding:13px 8px;border-radius:14px;background:var(--panel);box-shadow:inset 0 0 0 1px var(--line);text-align:center;border-top:3px solid var(--c)}
.axb .e{font-size:22px}.axb .n{font-size:10px;color:var(--muted);font-weight:700;margin-top:5px;text-transform:uppercase}.axb .r{font-size:12.5px;font-weight:850;margin-top:2px}
.secth{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 13px}
.secth h3{margin:0;font-size:16px;font-weight:850;text-transform:uppercase;letter-spacing:.02em}
.secth .tag{font-size:11px;color:var(--muted);font-weight:700}
.mission{display:flex;align-items:center;gap:14px;padding:15px;border-radius:14px;background:var(--panel);box-shadow:inset 0 0 0 1px var(--line);margin-bottom:11px;border-left:3px solid var(--c)}
.mission .me{width:40px;height:40px;flex:none;display:grid;place-items:center;font-size:20px;border-radius:11px;background:var(--panel2)}
.mission .mt{font-weight:750;font-size:14.5px}.mission .ms{font-size:12px;color:var(--muted);margin-top:2px}
.mission .mx{margin-left:auto;font-weight:850;color:var(--accent2);font-size:13px}
.hubnote{margin-top:20px;padding:17px;border-radius:14px;background:rgba(255,122,41,.07);box-shadow:inset 0 0 0 1px var(--line2);font-size:13px;color:var(--muted);line-height:1.55}
.hubnote b{color:var(--text)}
.redo{display:block;width:100%;text-align:center;color:var(--muted2);font-size:12px;font-weight:700;margin-top:18px;padding:10px}
</style>
</head>
<body>
<div id="frame"></div>
<script>
/* ============================================================================
   APEX — onboarding immersif v2. Vanilla JS, zéro dépendance, offline.
   ============================================================================ */
(function(){
"use strict";
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>Array.from(r.querySelectorAll(s));
const frame = document.getElementById('frame');
const MONTHS=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];

const AXES=[
  {key:'physique',name:'Physique',short:'Physique',icon:'🏋️',c:'#FF7A29'},
  {key:'mental',name:'Mental',short:'Mental',icon:'🧠',c:'#9B7BFF'},
  {key:'intellect',name:'Intellect',short:'Intellect',icon:'📚',c:'#3FC9E0'},
  {key:'sante',name:'Santé & Sommeil',short:'Santé',icon:'🌙',c:'#43D9A3'},
];
const RANKS=['Bronze','Argent','Or','Platine','Diamant','Master','Prédateur'];
const RANKC={Bronze:'#CD7F32',Argent:'#C9D0DA',Or:'#FFC53D',Platine:'#7BE4FF',Diamant:'#B9A7FF',Master:'#FF8A6A','Prédateur':'#DA292A'};
const ACCENTS=[['#FF7A29'],['#DA292A'],['#3FC9E0'],['#9B7BFF'],['#43D9A3'],['#FFC53D']];

/* ====================== NOVA — mascotte drone-IA ====================== */
let novaUID=0;
function nova(mood, size){
  mood=mood||'neutral'; size=size||120; const u='n'+(novaUID++);
  const eyeC = '#5FE6F2';
  // expression de l'œil selon l'humeur
  let eye;
  if(mood==='happy'||mood==='celebrate'){
    eye=`<path d="M44 60 Q52 50 60 60" fill="none" stroke="${eyeC}" stroke-width="5" stroke-linecap="round"/>
         <path d="M60 60 Q68 50 76 60" fill="none" stroke="${eyeC}" stroke-width="5" stroke-linecap="round"/>`;
  } else if(mood==='think'){
    eye=`<ellipse cx="64" cy="56" rx="11" ry="13" fill="url(#eg${u})"/><circle cx="67" cy="51" r="3.4" fill="#fff" opacity=".85"/>
         <text x="86" y="40" font-size="20" fill="${eyeC}" font-weight="900">?</text>`;
  } else if(mood==='wave'){
    eye=`<g class="nova-blink" style="transform-origin:60px 58px"><ellipse cx="60" cy="58" rx="12" ry="14" fill="url(#eg${u})"/><circle cx="64" cy="52" r="3.6" fill="#fff" opacity=".85"/></g>`;
  } else {
    eye=`<g class="nova-blink" style="transform-origin:60px 58px"><ellipse cx="60" cy="58" rx="12" ry="14" fill="url(#eg${u})"/><circle cx="64" cy="52" r="3.6" fill="#fff" opacity=".85"/></g>`;
  }
  const sparks = (mood==='celebrate')
    ? `<g class="spark"><path d="M24 30 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3z" fill="#FFC53D"/></g>
       <g class="spark" style="animation-delay:.4s"><path d="M96 26 l2.4 5.6 5.6 2.4 -5.6 2.4 -2.4 5.6 -2.4 -5.6 -5.6 -2.4 5.6 -2.4z" fill="#FF7A29"/></g>`
    : '';
  const arm = (mood==='wave'||mood==='celebrate')
    ? `<g style="transform-origin:96px 70px"><rect x="92" y="46" width="9" height="26" rx="4.5" fill="#3a4150" transform="rotate(28 96 70)"/><circle cx="101" cy="44" r="6" fill="${eyeC}"/></g>`
    : '';
  return `<svg viewBox="0 0 120 120" width="${size}" style="overflow:visible;display:block">
    <defs>
      <linearGradient id="bg${u}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2A3140"/><stop offset="1" stop-color="#181C26"/></linearGradient>
      <radialGradient id="eg${u}" cx="40%" cy="35%" r="70%"><stop offset="0" stop-color="#bdf6fc"/><stop offset="1" stop-color="${eyeC}"/></radialGradient>
    </defs>
    <ellipse class="nova-shadow" cx="60" cy="113" rx="26" ry="5" fill="#000" style="transform-origin:60px 113px"/>
    <g class="nova-float">
      ${sparks}
      <!-- antenne -->
      <line x1="60" y1="16" x2="60" y2="6" stroke="#3a4150" stroke-width="3"/><circle cx="60" cy="5" r="4" fill="#FF7A29"><animate attributeName="opacity" values="1;.4;1" dur="1.8s" repeatCount="indefinite"/></circle>
      <!-- réacteurs -->
      <ellipse cx="34" cy="92" rx="10" ry="5" fill="#FF7A29" opacity=".5"/><ellipse cx="86" cy="92" rx="10" ry="5" fill="#FF7A29" opacity=".5"/>
      <!-- corps hexa arrondi -->
      <path d="M60 16 L96 36 Q100 38 100 44 V72 Q100 78 96 80 L66 98 Q60 101 54 98 L24 80 Q20 78 20 72 V44 Q20 38 24 36 Z" fill="url(#bg${u})" stroke="#FF7A29" stroke-width="2.5"/>
      <!-- visière -->
      <path d="M30 50 Q60 42 90 50 L90 66 Q60 76 30 66 Z" fill="#0E1117"/>
      ${eye}
      ${arm}
    </g>
  </svg>`;
}

/* ====================== avatars (hexa, 6 variantes) ====================== */

function avatarSVG(i,accent){

/* ====================== navigation + transitions ====================== */
function next(){ if(idx<STEPS.length-1){ navDir='right'; idx++; render(); } }
function back(){ if(idx>0){ navDir='left'; idx--; render(); } }
function render(){
  const step=STEPS[idx];
  if(step.type==='hub'){ renderHub(); return; }
  const showTop = !['splash','loading','reveal','flash'].includes(step.type);
  frame.innerHTML=`
    ${showTop?`<div class="topbar"><button class="backbtn ${idx===0?'hide':''}" id="back">‹</button><div class="pbar"><i id="pf"></i></div></div>`:''}
    <div class="stage ${navDir==='right'?'enter-right':'enter-left'}" id="stage"></div>
    <div class="footer" id="footer"></div>`;
  if(showTop){ $('#pf').style.width=Math.min(100,(idx/LASTQ)*100)+'%'; const b=$('#back'); if(b) b.onclick=back; }
  RENDER[step.type](step, $('#stage'), $('#footer'));
  window.scrollTo&&window.scrollTo(0,0);
}
function cta(footer,label,enabled,onClick,skip){
  footer.innerHTML=`<button class="cta" id="cta" ${enabled?'':'disabled'}>${label}</button>${skip?`<button class="skip" id="skip">${skip}</button>`:''}`;
  $('#cta').onclick=()=>{ if(!$('#cta').disabled) onClick(); };
  if(skip) $('#skip').onclick=next;
}
function novaBar(step,q){ return `<div class="novabar"><div class="mini">${nova(step.mood,64)}</div><div class="bubble">${q}</div></div>`; }

      <div class="testi"><div class="stars">★★★★★</div>
        <div class="tx">« J'ai enfin un fil conducteur. Je vois mes progrès chaque jour, ça me pousse à continuer. De loin la meilleure app que j'ai utilisée. »</div>
        <div class="who"><div class="av"></div>@maxlifts</div></div>`;
    cta(footer,'Continuer',true,next);
  },
  commit(s,stage,footer){
    stage.innerHTML=`<div class="center" style="text-align:center">
      <h1 class="q" style="text-align:center">Je vais utiliser APEX pour…</h1>
      <p class="sub" style="text-align:center">devenir la meilleure version de moi-même, un jour à la fois.</p>
      <div class="holdwrap"><div class="holdbtn" id="hold">
        <svg viewBox="0 0 150 150"><circle class="ring-bg" cx="75" cy="75" r="70"/><circle class="ring-fg" cx="75" cy="75" r="70"/></svg>
        <div class="core" id="hcore">${nova('neutral',60)}</div></div>
        <div class="holdhint">Reste appuyé sur NOVA pour confirmer</div></div></div>`;
    const hb=$('#hold'); let done=false;
    const start=()=>{ hb.classList.add('holding'); };
    const cancel=()=>{ if(!done) hb.classList.remove('holding'); };
    hb.addEventListener('pointerdown',start); hb.addEventListener('pointerup',cancel); hb.addEventListener('pointerleave',cancel);
    $('.ring-fg',hb).addEventListener('transitionend',e=>{ if(e.propertyName==='stroke-dashoffset' && hb.classList.contains('holding')){ done=true; next(); } });
    footer.innerHTML='';
  },
  avatar(s,stage,footer){
    if(P[s.key]===undefined) P[s.key]=0; const ac=P.accent||'#FF7A29';
    stage.innerHTML=`${novaBar(s,s.q)}<p class="sub" style="margin-top:-8px">${s.sub}</p>
      <div class="avgrid">${AVP.map((p,i)=>`<button class="avopt ${P[s.key]===i?'sel':''}" data-i="${i}">${avatarSVG(i,ac)}</button>`).join('')}</div>`;
    $$('.avopt',stage).forEach(b=> b.onclick=()=>{ P[s.key]=+b.dataset.i; save(); $$('.avopt',stage).forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); });
    cta(footer,'Continuer',true,next);
  },
  accent(s,stage,footer){
    if(P[s.key]===undefined) P[s.key]='#FF7A29';
    stage.innerHTML=`${novaBar(s,s.q)}<p class="sub" style="margin-top:-8px">${s.sub}</p>
      <div style="display:grid;place-items:center;margin:12px 0" id="prev">${avatarSVG(P.avatar||0,P[s.key])}</div>
      <div class="accents">${ACCENTS.map(([c])=>`<button class="acc ${P[s.key]===c?'sel':''}" data-c="${c}" style="background:${c};box-shadow:0 0 14px ${c}77"></button>`).join('')}</div>`;
    $$('.acc',stage).forEach(b=> b.onclick=()=>{ P[s.key]=b.dataset.c; save(); $$('.acc',stage).forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); $('#prev').innerHTML=avatarSVG(P.avatar||0,P[s.key]); });
    cta(footer,'Continuer',true,next);
  },
  projection(s,stage,footer){
    const r=computeProfile(); const target=RANKS[Math.min(RANKS.length-1,2)];
    let d; try{ d=new Date(); d.setDate(d.getDate()+75); }catch(e){ d=null; }
    const when=d?`${MONTHS[d.getMonth()]} ${d.getFullYear()}`:'dans ~3 mois';
    stage.innerHTML=`<div class="kick">Projection NOVA</div>
      <h1 class="q">Ton potentiel est <span class="hl">réel</span></h1>
      <p class="sub">D'après ton profil, voilà où tu peux être en avançant régulièrement.</p>
      <div class="projbox">${projChart(target)}<div class="pl"><span>Aujourd'hui</span><span style="color:var(--accent2);font-weight:800">${when}</span></div></div>
      <p class="sub" style="text-align:center;margin-top:18px">Tu peux viser <b style="color:${RANKC[target]}">${target}</b> d'ici <b style="color:#fff">${when}</b>. 🔥</p>`;
    cta(footer,'Continuer',true,next);
  },
  loading(s,stage,footer){
    const rows=[['Compilation de ton profil','#FF7A29'],['Calcul de tes niveaux par axe','#3FC9E0'],['Génération de tes missions','#43D9A3']];
    stage.innerHTML=`<div class="center"><div style="display:grid;place-items:center;margin-bottom:18px">${nova('think',110)}</div>
      <h1 class="q" style="margin-bottom:22px">NOVA prépare ton <span class="hl">arène</span>…</h1>
      <div class="loadwrap">${rows.map((r,i)=>`<div class="loadrow"><div class="lt"><span>${r[0]}</span><b id="p${i}">0%</b></div><div class="lbar"><i id="b${i}" style="background:linear-gradient(90deg,${r[1]},var(--accent2))"></i></div></div>`).join('')}</div></div>`;
    footer.innerHTML=''; let done=0;
    rows.forEach((r,i)=>{ let pc=0; setTimeout(()=>{ const t=setInterval(()=>{ pc+=Math.random()*16+9; if(pc>=100){pc=100;clearInterval(t);done++;if(done===rows.length)setTimeout(next,450);} const b=$('#b'+i),p=$('#p'+i); if(b)b.style.width=pc+'%'; if(p)p.textContent=Math.round(pc)+'%'; },120); },350+i*520); });
  },
  reveal(s,stage,footer){
    const r=computeProfile();
    stage.innerHTML=`<div class="middle"><div class="kick">Profil calibré</div>
      <div style="width:140px;height:154px;margin:6px 0 12px">${bigHex(P.accent||'#FF7A29')}</div>
      <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">Indice APEX de départ</div>
      <div class="indice">${r.indice}</div>
      <div class="axranks" style="width:100%">${AXES.map(a=>`<div class="arc"><div class="ae">${a.icon}</div><div style="flex:1"><div class="an">${a.short}</div><div class="ar" style="color:${RANKC[r.ranks[a.key]]}">${r.ranks[a.key]}</div></div></div>`).join('')}</div>
      <p class="sub" style="text-align:center">Bienvenue dans l'arène, <b style="color:#fff">${P.name||'Légende'}</b>. ${r.missions.length} missions t'attendent.</p></div>`;
    cta(footer,'Entrer dans APEX',true,()=>{ try{localStorage.setItem('apex_done','1');}catch(e){} next(); });
    confetti();
  },
};

/* ====================== illustrations ====================== */
function pitchArt(id){
  if(id==='axes') return `<div class="axgrid">${AXES.map(a=>`<div class="axcard" style="--c:${a.c}"><div class="ae">${a.icon}</div><div class="an">${a.name}</div><div class="ad">${({physique:'Force & énergie',mental:'Calme & focus',intellect:'Savoir & curiosité',sante:'Récup & sommeil'})[a.key]}</div></div>`).join('')}</div>`;
  if(id==='time') return `<div class="tline">
    <div class="trow"><div style="font-size:22px">☀️</div><div><div class="tt">Quotidien</div><div class="ts">3-5 missions courtes</div></div></div>
    <div class="trow"><div style="font-size:22px">📅</div><div><div class="tt">Hebdo</div><div class="ts">Des défis sur la semaine</div></div></div>
    <div class="trow"><div style="font-size:22px">🗓️</div><div><div class="tt">Mensuel</div><div class="ts">Une grande mission par mois</div></div></div>
    <div class="trow"><div style="font-size:22px">🏔️</div><div><div class="tt">Annuel</div><div class="ts">Le Sommet : ton objectif de l'année</div></div></div></div>`;
  if(id==='ladder') return `<div class="ladder">${RANKS.map((r,i)=>`<div class="lrow"><div class="lh">${hexSVG(RANKC[r])}</div><div class="ln">${r}</div><div class="lp">${['Le début','','','','','','Élite'][i]||''}</div></div>`).join('')}</div>`;
  if(id==='avatarTease') return `<div style="display:flex;gap:16px;align-items:center">${avatarSVG(0,'#FF7A29')}<div style="font-size:28px;color:var(--accent2)">➜</div>${avatarSVG(0,'#DA292A')}</div>`;
  return '';
}
function projChart(target){
  return `<svg viewBox="0 0 300 120" width="100%" style="display:block"><defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FF7A29" stop-opacity=".3"/><stop offset="1" stop-color="#FF7A29" stop-opacity="0"/></linearGradient></defs>
    <path d="M14 100 C 90 96 150 70 210 38 S 280 16 286 14 L286 110 L14 110 Z" fill="url(#pg)"/>
    <path d="M14 100 C 90 96 150 70 210 38 S 280 16 286 14" fill="none" stroke="#FFB36B" stroke-width="3" stroke-linecap="round"/>
    <circle cx="14" cy="100" r="5" fill="#CD7F32" stroke="#101218" stroke-width="2"/>
    <circle cx="286" cy="14" r="6" fill="${RANKC[target]}" stroke="#101218" stroke-width="2"/></svg>`;
}

/* ====================== calcul + missions ====================== */
function rankFromScore(x){ return RANKS[Math.min(RANKS.length-1,Math.floor(x/16))]; }
function computeProfile(){
  const phys=((P.phys_experience||0)/3)*60 + ((P.phys_energy||2)/4)*30 + 10;
  const stress=P.mental_stress||3; const mh=(P.mental_habits||[]);
  const mental=(6-stress)/5*60 + (mh.includes('rien')?5:25);
  const ih=(P.intel_habits||[]).filter(h=>h!=='rien').length;
  const intel=(ih/3)*55 + (6-(P.intel_screen||3))/5*35;
  const sante=((P.sleep_quality||3)/5)*60 + Math.min(30,((P.sleep_hours||7)/8)*30);
  const ranks={physique:rankFromScore(phys),mental:rankFromScore(mental),intellect:rankFromScore(intel),sante:rankFromScore(sante)};
  const indice=Math.round((phys+mental+intel+sante)/4*4.2);
  return {ranks,indice,missions:generateMissions()};
}
const MLIB={
  physique:[{icon:'🚶',t:'10 000 pas aujourd\'hui',xp:20},{icon:'💪',t:'3 séries de pompes',xp:15},{icon:'🏃',t:'20 min de cardio',xp:25}],
  mental:[{icon:'🧘',t:'5 min de respiration guidée',xp:15},{icon:'📓',t:'3 lignes dans ton journal',xp:15},{icon:'🙏',t:'Note 1 gratitude',xp:10}],
  intellect:[{icon:'📖',t:'Lis 10 pages',xp:20},{icon:'🎧',t:'1 épisode de podcast utile',xp:15},{icon:'📵',t:'15 min de scroll → lecture',xp:20}],
  sante:[{icon:'💧',t:'Bois 1,5 L d\'eau',xp:15},{icon:'🌙',t:'Au lit avant 23h30',xp:20},{icon:'🥗',t:'1 repas équilibré maison',xp:15}],
};
function generateMissions(){ const out=[]; const n=(P.phys_duration||30)>=45?2:1; AXES.forEach(a=>{const pool=MLIB[a.key];for(let i=0;i<n;i++)out.push({...pool[i%pool.length],axis:a.key,c:a.c});}); return out; }

/* ====================== célébration ====================== */
function confetti(){ const cols=['#FF7A29','#FFB36B','#FFC53D','#3FC9E0','#9B7BFF','#43D9A3'];
  for(let i=0;i<40;i++){ const c=document.createElement('span'); c.className='confetti'; c.style.left=(Math.random()*100)+'%'; c.style.background=cols[i%cols.length]; c.style.animationDuration=(1.6+Math.random()*1.5)+'s'; c.style.animationDelay=(Math.random()*.5)+'s'; document.body.appendChild(c); setTimeout(()=>c.remove(),3600); } }

/* ====================== HUB ====================== */
function renderHub(){
  const r=computeProfile(); const ac=P.accent||'#FF7A29';
  frame.innerHTML=`<div class="hub enter-right">
    <div class="hubhead"><div class="hubAv">${avatarSVG(P.avatar||0,ac)}</div>
      <div style="flex:1"><div class="hubName">${P.name||'Légende'}</div><div class="hubMeta">Indice APEX <b style="color:#fff">${r.indice}</b> · Niveau 1</div></div>
      <div class="hbadge">⬡ Recrue</div></div>
    <div class="axisbar">${AXES.map(a=>`<div class="axb" style="--c:${a.c}"><div class="e">${a.icon}</div><div class="n">${a.short}</div><div class="r" style="color:${RANKC[r.ranks[a.key]]}">${r.ranks[a.key]}</div></div>`).join('')}</div>
    <div class="secth"><h3>Missions du jour</h3><span class="tag">générées pour toi</span></div>
    ${r.missions.map(m=>{const a=AXES.find(x=>x.key===m.axis);return `<div class="mission" style="--c:${m.c}"><div class="me">${m.icon}</div><div style="flex:1"><div class="mt">${m.t}</div><div class="ms">${a.icon} ${a.short}</div></div><div class="mx">+${m.xp} XP</div></div>`;}).join('')}
    <div class="hubnote">🚧 <b>QG provisoire.</b> Ton onboarding est terminé et ton profil est enregistré.<br><br>Prochaine étape : le <b>vrai accueil</b> (avatar + XP + streak + PV), les <b>4 étages de missions</b> (jour/semaine/mois/année) et l'<b>arbre de compétences</b> façon Valhalla.</div>
    <button class="redo" id="redo">↺ Refaire l'onboarding</button></div>`;
  $('#redo').onclick=()=>{ try{localStorage.removeItem('apex_done');localStorage.removeItem('apex_profile');}catch(e){} P={};idx=0;navDir='right';render(); };
}

/* ====================== boot ====================== */
function boot(){ try{ if(localStorage.getItem('apex_done')==='1'){ idx=STEPS.length-1; renderHub(); return; } }catch(e){} idx=0; render(); }
boot();
window.APEX={get P(){return P;},reset(){try{localStorage.clear();}catch(e){}P={};idx=0;navDir='right';render();},goto(i){navDir='right';idx=i;render();}};
})();
</script>
