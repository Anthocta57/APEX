<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B0D12">
<title>APEX — L'entraînement comme un RPG</title>
<style>
/* ============================================================
   APEX — Design tokens
   ============================================================ */
:root{
  --bg:#0B0D12;
  --bg-grad:radial-gradient(1200px 600px at 50% -10%, #15171f 0%, #0B0D12 55%);
  --card:#14171F;
  --card-2:#1B1F2A;
  --card-3:#222736;
  --line:rgba(255,255,255,.07);
  --line-strong:rgba(255,255,255,.13);
  --text:#F2F4F8;
  --muted:#8A92A6;
  --muted-2:#5d6478;
  --accent:#FF6A00;
  --accent-2:#FF9A3D;
  --accent-soft:rgba(255,106,0,.14);
  --accent-glow:0 0 24px rgba(255,106,0,.45);
  --good:#36D399;
  --hp:#F2545B;
  --xp:#FF6A00;
  --bronze:#CD7F32;
  --silver:#C9D0DA;
  --gold:#FFC53D;
  --platine:#7BE4FF;
  --titan:#C28BFF;
  --r-lg:22px;
  --r-md:16px;
  --r-sm:11px;
  --shadow:0 10px 30px rgba(0,0,0,.45);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,Roboto,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  background:var(--bg);
  background-image:var(--bg-grad);
  background-attachment:fixed;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}

/* ============================================================
   App shell — phone frame
   ============================================================ */
#frame{
  max-width:440px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  padding-bottom:96px;
}
#app{padding:0 16px}
.screen{display:none;animation:fade .35s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* App bar */
.appbar{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;
  background:linear-gradient(180deg,var(--bg) 60%,rgba(11,13,18,0));
  backdrop-filter:blur(6px);
}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.14em;font-size:15px}
.brand .logo{
  width:30px;height:30px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),#ff3d00);
  display:grid;place-items:center;font-size:16px;
  box-shadow:var(--accent-glow);
}
.brand small{color:var(--accent-2);font-weight:800}
.screen-title{font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.04em}

/* ============================================================
   Cards & primitives
   ============================================================ */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  padding:18px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}
.card.tight{padding:14px}
.row{display:flex;align-items:center;gap:12px}
.between{justify-content:space-between}
.col{display:flex;flex-direction:column}
.muted{color:var(--muted)}
.tiny{font-size:11px}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700}
.big-num{font-size:44px;font-weight:850;line-height:1;letter-spacing:-.02em}
.grad-text{background:linear-gradient(135deg,#fff,var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
.pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700;
  background:var(--card-2);border:1px solid var(--line);
}
.section-h{display:flex;align-items:center;justify-content:space-between;margin:22px 4px 12px}
.section-h h2{font-size:17px;margin:0;font-weight:800;letter-spacing:-.01em}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 18px;border-radius:14px;font-weight:800;font-size:15px;
  background:var(--card-2);border:1px solid var(--line-strong);transition:.15s transform,.15s filter;
}
.btn:active{transform:scale(.97)}
.btn.primary{
  background:linear-gradient(135deg,var(--accent),#ff3d00);
  color:#fff;border:none;box-shadow:var(--accent-glow);
}
.btn.block{width:100%}
.btn.ghost{background:transparent}
.btn.sm{padding:9px 13px;font-size:13px;border-radius:11px}

/* ============================================================
   Progress bars
   ============================================================ */
.bar{height:12px;border-radius:999px;background:var(--card-3);overflow:hidden;position:relative}
.bar > i{display:block;height:100%;border-radius:999px;transition:width .9s cubic-bezier(.22,1,.36,1)}
.bar.xp > i{background:linear-gradient(90deg,#ff8a00,var(--accent-2));box-shadow:0 0 14px rgba(255,154,61,.6)}
.bar.hp > i{background:linear-gradient(90deg,#ff7a7a,var(--hp))}
.bar.q > i{background:linear-gradient(90deg,var(--accent),var(--accent-2))}
.bar.thin{height:8px}

/* ============================================================
   Rank badges (metallic)
   ============================================================ */
.rank{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 11px 4px 8px;border-radius:999px;font-weight:800;font-size:12px;letter-spacing:.02em;
  border:1px solid rgba(255,255,255,.18);
  position:relative;color:#1a1a1a;
}
.rank .dot{width:13px;height:13px;border-radius:50%;box-shadow:inset 0 0 0 1.5px rgba(0,0,0,.25),inset -2px -2px 3px rgba(0,0,0,.3),inset 2px 2px 3px rgba(255,255,255,.55)}
.rank.Bronze{background:linear-gradient(135deg,#e7a866,#9c5a23);color:#3a1d08}
.rank.Bronze .dot{background:var(--bronze)}
.rank.Argent{background:linear-gradient(135deg,#f4f7fb,#aab2bf);color:#2b3038}
.rank.Argent .dot{background:var(--silver)}
.rank.Or{background:linear-gradient(135deg,#ffe08a,#e0a615);color:#4a3500}
.rank.Or .dot{background:var(--gold)}
.rank.Platine{background:linear-gradient(135deg,#cdf6ff,#5fb9d6);color:#0d3340}
.rank.Platine .dot{background:var(--platine)}
.rank.Titan{background:linear-gradient(135deg,#e3ccff,#9a5bf0);color:#2a0d50}
.rank.Titan .dot{background:var(--titan)}
.rank.lg{font-size:14px;padding:6px 14px 6px 10px}
.rank.lg .dot{width:16px;height:16px}

/* ============================================================
   Home — avatar / hero
   ============================================================ */
.hero{display:flex;gap:16px;align-items:center}
.avatar{
  width:74px;height:74px;border-radius:20px;flex:none;position:relative;
  background:linear-gradient(135deg,#2a2f3e,#171a23);
  border:1.5px solid var(--line-strong);
  display:grid;place-items:center;font-size:36px;
  box-shadow:inset 0 0 22px rgba(255,106,0,.12);
}
.avatar .lvlbadge{
  position:absolute;right:-7px;bottom:-7px;
  min-width:26px;height:26px;padding:0 6px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),#ff3d00);
  color:#fff;font-weight:850;font-size:13px;display:grid;place-items:center;
  border:2px solid var(--bg);box-shadow:var(--accent-glow);
}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.stat{
  background:var(--card-2);border:1px solid var(--line);border-radius:var(--r-md);padding:13px 14px;
}
.stat .label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.stat .value{font-size:26px;font-weight:850;margin-top:5px;display:flex;align-items:baseline;gap:5px}
.stat .value small{font-size:13px;color:var(--muted);font-weight:700}
.flame{font-size:15px;filter:drop-shadow(0 0 6px rgba(255,120,0,.7))}

/* Strength score hero card */
.scorecard{
  text-align:center;position:relative;overflow:hidden;
  background:
    radial-gradient(140px 90px at 50% 0%,rgba(255,106,0,.22),transparent 70%),
    var(--card);
}
.scorecard .ring{position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,rgba(255,106,0,.10),transparent 60%);pointer-events:none}
.scorecard .big-num{font-size:64px;margin:6px 0 2px}

/* Quests */
.quest{
  display:flex;align-items:center;gap:13px;padding:13px;border-radius:var(--r-md);
  background:var(--card-2);border:1px solid var(--line);margin-bottom:10px;transition:.2s;
}
.quest.done{opacity:.6}
.quest .qi{
  width:40px;height:40px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:19px;
  background:var(--accent-soft);border:1px solid rgba(255,106,0,.25);
}
.quest.done .qi{background:rgba(54,211,153,.14);border-color:rgba(54,211,153,.3)}
.quest .qmain{flex:1;min-width:0}
.quest .qt{font-weight:700;font-size:14px}
.quest .qs{font-size:12px;color:var(--muted);margin-top:3px}
.quest .qx{font-weight:850;color:var(--accent-2);font-size:13px;flex:none}
.check{color:var(--good);font-size:20px;flex:none}

/* tabs (quest tiers / progression) */
.tabs{display:flex;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:5px;margin-bottom:16px}
.tabs button{flex:1;padding:9px 6px;border-radius:10px;font-weight:700;font-size:12.5px;color:var(--muted);transition:.18s}
.tabs button.on{background:var(--accent-soft);color:var(--accent-2);box-shadow:inset 0 0 0 1px rgba(255,106,0,.3)}

/* ============================================================
   Logger
   ============================================================ */
.chips{display:flex;flex-wrap:wrap;gap:9px}
.chip{
  padding:10px 14px;border-radius:13px;font-weight:700;font-size:13.5px;
  background:var(--card-2);border:1px solid var(--line-strong);transition:.15s;display:flex;align-items:center;gap:7px;
}
.chip.on{background:linear-gradient(135deg,var(--accent),#ff3d00);color:#fff;border-color:transparent;box-shadow:var(--accent-glow)}
.chip .em{font-size:15px}
.numrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-top:14px}
.field{background:var(--card-2);border:1px solid var(--line-strong);border-radius:14px;padding:11px 12px}
.field label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.field input{
  width:100%;background:none;border:none;color:var(--text);
  font-size:26px;font-weight:850;margin-top:4px;outline:none;padding:0;
}
.field .unit{font-size:13px;color:var(--muted)}
.e1rm-preview{
  margin-top:14px;display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-radius:var(--r-md);
  background:linear-gradient(135deg,rgba(255,106,0,.1),rgba(255,106,0,.02));
  border:1px solid rgba(255,106,0,.22);
}
.e1rm-preview .v{font-size:30px;font-weight:850}
.draft-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:13px;background:var(--card-2);border:1px solid var(--line);margin-bottom:9px}
.draft-item .x{margin-left:auto;color:var(--muted);font-size:18px;padding:4px 8px}
.newx{display:none;margin-top:12px;padding:14px;border-radius:14px;background:var(--card-2);border:1px dashed var(--line-strong)}
.newx.show{display:block}
.txt{width:100%;background:var(--card-3);border:1px solid var(--line-strong);border-radius:11px;padding:11px 12px;color:var(--text);font-size:15px;font-weight:600;outline:none;margin-top:8px}

/* ============================================================
   Progression — chart & body
   ============================================================ */
.exhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.exhead .nm{font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px}
.chart-wrap{margin-top:6px;position:relative}
.chart-meta{display:flex;justify-content:space-between;margin-top:8px;font-size:11.5px;color:var(--muted)}
.bodyview{display:flex;gap:8px;justify-content:center;align-items:flex-start}
.bodyview .lbl{text-align:center;font-size:11px;color:var(--muted);font-weight:700;margin-top:6px}
.musclelist{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;justify-content:center}
.mtag{font-size:11.5px;padding:5px 10px;border-radius:999px;background:var(--card-2);border:1px solid var(--line);color:var(--muted);font-weight:700}
.mtag.hot{background:var(--accent-soft);border-color:rgba(255,106,0,.3);color:var(--accent-2)}

/* ============================================================
   Cercle
   ============================================================ */
.friend{display:flex;align-items:center;gap:13px;padding:13px;border-radius:var(--r-md);background:var(--card-2);border:1px solid var(--line);margin-bottom:10px}
.friend.me{border-color:rgba(255,106,0,.4);background:linear-gradient(135deg,rgba(255,106,0,.08),var(--card-2))}
.friend .fav{width:46px;height:46px;border-radius:13px;flex:none;display:grid;place-items:center;font-size:23px;background:linear-gradient(135deg,#2a2f3e,#171a23);border:1px solid var(--line-strong)}
.friend .pos{width:24px;text-align:center;font-weight:850;color:var(--muted);font-size:15px}
.friend .fn{font-weight:800;font-size:15px;display:flex;align-items:center;gap:7px}
.friend .fmeta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:10px;align-items:center}

/* ============================================================
   Récompenses
   ============================================================ */
.reward{display:flex;align-items:center;gap:13px;padding:14px;border-radius:var(--r-md);background:var(--card-2);border:1px solid var(--line);margin-bottom:11px;position:relative;overflow:hidden}
.reward.locked{opacity:.85}
.reward .re{width:46px;height:46px;border-radius:13px;flex:none;display:grid;place-items:center;font-size:22px;background:var(--accent-soft);border:1px solid rgba(255,106,0,.25)}
.reward .rt{font-weight:800;font-size:15px}
.reward .rc{font-size:12px;color:var(--muted);margin-top:3px}
.reward .rstate{margin-left:auto;flex:none;font-size:12px;font-weight:800;padding:6px 11px;border-radius:999px}
.reward .rstate.lock{background:var(--card-3);color:var(--muted)}
.reward .rstate.open{background:rgba(54,211,153,.16);color:var(--good)}

/* ============================================================
   Bottom nav
   ============================================================ */
#nav{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  max-width:440px;margin:0 auto;
  display:grid;grid-template-columns:repeat(6,1fr);
  background:rgba(16,18,25,.92);backdrop-filter:blur(18px);
  border-top:1px solid var(--line-strong);
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
}
#nav button{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted-2);font-size:9.5px;font-weight:700;letter-spacing:.02em;padding:4px 0;transition:.15s}
#nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#nav button.on{color:var(--accent-2)}
#nav button.on svg{filter:drop-shadow(0 0 6px rgba(255,154,61,.6))}
#nav .fab{position:relative}

/* ============================================================
   Overlay / celebrations
   ============================================================ */
#overlay{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;padding:24px;
  background:rgba(6,7,11,.74);backdrop-filter:blur(8px)}
#overlay.show{display:flex;animation:fade .25s ease}
.ovcard{
  width:100%;max-width:380px;background:linear-gradient(180deg,var(--card-2),var(--card));
  border:1px solid var(--line-strong);border-radius:26px;padding:26px 22px 22px;text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,.6);position:relative;animation:pop .45s cubic-bezier(.2,1.3,.4,1)}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.ovcard .burst{font-size:54px;animation:bounce 1s ease infinite alternate;display:inline-block}
@keyframes bounce{to{transform:translateY(-8px) scale(1.06)}}
.ovcard h3{font-size:23px;margin:10px 0 4px;font-weight:850;letter-spacing:-.01em}
.ovrow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line)}
.ovrow:last-of-type{border-bottom:none}
.ovrow .l{display:flex;align-items:center;gap:9px;font-size:14px}
.ovrow .r{font-weight:850}
.xpbubble{font-size:40px;font-weight:850;margin:12px 0}
.confetti{position:absolute;top:0;width:9px;height:14px;border-radius:2px;opacity:.95;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(120vh) rotate(720deg);opacity:0}}
.rankup-anim{display:flex;align-items:center;justify-content:center;gap:12px;margin:14px 0;font-size:15px;font-weight:800}
.rankup-anim .arrow{color:var(--accent-2);animation:slide .8s ease infinite}
@keyframes slide{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}

.toast{position:fixed;left:50%;top:18px;transform:translateX(-50%) translateY(-80px);z-index:95;
  background:var(--card-2);border:1px solid var(--line-strong);border-radius:14px;padding:12px 18px;font-weight:700;font-size:14px;
  box-shadow:var(--shadow);transition:transform .35s cubic-bezier(.2,1.2,.4,1);display:flex;gap:9px;align-items:center}
.toast.show{transform:translateX(-50%) translateY(0)}

.mission-card{position:relative;overflow:hidden;
  background:radial-gradient(220px 120px at 100% 0,rgba(194,139,255,.16),transparent 60%),var(--card)}
.diff{display:inline-flex;gap:3px}
.diff i{width:7px;height:14px;border-radius:2px;background:var(--card-3)}
.diff i.on{background:linear-gradient(180deg,var(--accent-2),var(--accent))}
.empty{color:var(--muted);text-align:center;padding:20px;font-size:13px}
</style>
</head>
<body>
<div id="frame">
  <div class="appbar">
    <div class="brand"><span class="logo">⚡</span>APE<small>X</small></div>
    <div class="screen-title" id="screenTitle">Le hub</div>
  </div>
  <div id="app"></div>
</div>

<nav id="nav"></nav>
<div id="overlay"></div>

<script>
/* ============================================================================
   APEX — moteur + état + rendu. Vanilla JS, zéro dépendance.
   ============================================================================ */
(function(){
"use strict";

/* ---------- utilitaires ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const el = id => document.getElementById(id);
const r1 = n => Math.round(n*10)/10;
const today = new Date(2026,5,25); // 25 juin 2026 (date du jour de la démo)
const DAY = 86400000;
const fmtDate = d => d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
const daysAgo = n => new Date(today.getTime()-n*DAY);
const sameDay = (a,b)=> a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();

/* ============================================================================
   MOTEUR D'XP  — coeur de l'app, conforme au spec.
   ============================================================================ */
const Engine = {
  // 1RM estimé — Epley : poids × (1 + reps/30)
  e1rm:(w,reps)=> w*(1+reps/30),

  // Coût pour passer du niveau L au niveau L+1 : 100, puis ×1,15 à chaque palier
  levelCost:(L)=> 100*Math.pow(1.15,L-1),

  // Niveau + progression à partir d'un total d'XP cumulée
  levelFromXp(total){
    let L=1, acc=0;
    while(acc + this.levelCost(L) <= total){ acc += this.levelCost(L); L++; }
    return { level:L, into: total-acc, need: this.levelCost(L) };
  },
  // XP cumulée nécessaire pour ATTEINDRE le niveau L
  xpForLevel(L){ let t=0; for(let i=1;i<L;i++) t+=this.levelCost(i); return t; },

  // Multiplicateur de streak : +10% par séance enchaînée, plafond +50%
  streakMult:(streak)=> 1 + Math.min(0.10*streak, 0.50),

  // Rang d'un exercice d'après le ratio 1RM/poids de corps
  rankFor(ratio){
    if(ratio>=2.25) return 'Titan';
    if(ratio>=1.75) return 'Platine';
    if(ratio>=1.25) return 'Or';
    if(ratio>=0.75) return 'Argent';
    return 'Bronze';
  },
  RANKS:['Bronze','Argent','Or','Platine','Titan'],
  rankIdx(r){ return this.RANKS.indexOf(r); },

  // XP d'un exercice d'après son 1RM vs le meilleur passé
  exerciseXp(est, prevBest, firstTime){
    if(firstTime) return {xp:15, cat:'first',  label:'Première fois',  pr:false};
    if(est > prevBest) return {xp:30, cat:'record', label:'NOUVEAU RECORD', pr:true};
    if(est >= prevBest*0.95) return {xp:15, cat:'solid', label:'Solide', pr:false};
    return {xp:5, cat:'light', label:'Léger', pr:false};
  }
};

/* ============================================================================
   DONNÉES DE DÉMO — profil niveau 7, streak 5, 3 exos, 3 potes, 1 mission.
   ============================================================================ */
const MUSCLES = {
  pecs:'Pectoraux', epaules:'Épaules', triceps:'Triceps', biceps:'Biceps',
  dos:'Dos', lombaires:'Lombaires', quads:'Quadriceps', ischios:'Ischios',
  fessiers:'Fessiers', avantbras:'Avant-bras', abdos:'Abdos'
};

function buildExercise(id, name, emoji, muscles, hist){
  const sessions=[]; let best=0;
  hist.forEach(([wk,w,reps,sets])=>{
    const est = Engine.e1rm(w,reps);
    const pr = est>best;
    if(pr) best=est;
    sessions.push({date:daysAgo(wk), w, reps, sets, e1rm:est, pr});
  });
  return {id,name,emoji,muscles,sessions,bestE1rm:best};
}

/* ---------- état (persisté si possible) ---------- */
let S;
function load(){
  try{
    const raw = localStorage.getItem('apex_v1');
    if(raw){ S = reviveDates(JSON.parse(raw)); return; }
  }catch(e){}
  S = buildSeed();
}
function reviveDates(o){
  o.user.lastLog = new Date(o.user.lastLog);
  o.exercises.forEach(e=> e.sessions.forEach(s=> s.date=new Date(s.date)));
  o.draft = o.draft||[];
  return o;
}
function save(){ try{ localStorage.setItem('apex_v1', JSON.stringify(S)); }catch(e){} }

/* ---------- dérivés ---------- */
function strengthScore(){ return Math.round(S.exercises.reduce((a,e)=>a+e.bestE1rm,0)); }
function exById(id){ return S.exercises.find(e=>e.id===id) || S.catalog.find(e=>e.id===id); }

/* ============================================================================
   FINALISER UNE SÉANCE — applique tout le moteur d'XP.
   ============================================================================ */
function finalizeSession(){
  const draft = S.draft;
  if(!draft.length) return;

  // streak : continue si dernière séance = hier, sinon reset à 1 (ou +0 si déjà loggé aujourd'hui)
  if(!sameDay(S.user.lastLog, today)){
    const diff = Math.round((today - new Date(S.user.lastLog.getFullYear(),S.user.lastLog.getMonth(),S.user.lastLog.getDate()))/DAY);
    S.user.streak = (diff===1) ? S.user.streak+1 : 1;
  }
  S.user.lastLog = today;
  const mult = Engine.streakMult(S.user.streak);

  let sumXp=0; const perEx=[]; let anyPR=false; const rankUps=[];
  const distinct = new Set();

  draft.forEach(d=>{
    let ex = exById(d.exId);
    // si l'exo vient du catalogue, on le matérialise dans la liste suivie
    if(!S.exercises.includes(ex)){
      ex = {...ex, sessions:[], bestE1rm:0, rank:'Bronze'};
      S.exercises.push(ex);
    }
    distinct.add(ex.id);
    const est = Engine.e1rm(d.w, d.reps);
    const firstTime = ex.sessions.length===0;
    const prevBest = ex.bestE1rm;
    const res = Engine.exerciseXp(est, prevBest, firstTime);
    const pr = est>prevBest;
    ex.sessions.push({date:today, w:d.w, reps:d.reps, sets:d.sets, e1rm:est, pr});
    const oldRank = ex.rank || 'Bronze';
    if(pr){ ex.bestE1rm = est; anyPR = anyPR||(!firstTime); }
    const newRank = Engine.rankFor(ex.bestE1rm/S.user.bodyweight);
    if(Engine.rankIdx(newRank) > Engine.rankIdx(oldRank)){ rankUps.push({name:ex.name,from:oldRank,to:newRank}); }
    ex.rank = newRank;
    sumXp += res.xp;
    perEx.push({name:ex.name, est:r1(est), xp:res.xp, label:res.label, pr});
  });

  const base=20;
  const sessionXp = Math.round((base + sumXp)*mult);

  const lvlBefore = Engine.levelFromXp(S.user.totalXp).level;
  S.user.totalXp += sessionXp;
  const lvlAfter = Engine.levelFromXp(S.user.totalXp).level;
  const leveledUp = lvlAfter>lvlBefore;

  // quêtes / mission
  S.user.sessionsMonth++;
  S.mission.prog = Math.min(S.mission.goal, S.mission.prog+1);
  markQuest('daily','d1',true);
  if(anyPR){ markQuest('daily','d2',true); markQuest('weekly','w2',true); }
  bumpQuest('daily','d3', distinct.size);
  bumpQuest('weekly','w1', 1);
  bumpQuest('yearly','y1', 1);
  if(S.exercises.some(e=>e.rank==='Titan')) markQuest('yearly','y2',true);

  // récompenses
  const unlocked=[];
  S.rewards.forEach(rw=>{
    if(rw.unlocked) return;
    if(rw.type==='pr' && anyPR){ rw.unlocked=true; unlocked.push(rw); }
    if(rw.type==='level' && lvlAfter>=rw.lvl){ rw.unlocked=true; unlocked.push(rw); }
    if(rw.type==='rank' && S.exercises.some(e=>e.rank==='Titan')){ rw.unlocked=true; unlocked.push(rw); }
  });

  S.draft=[];
  save();
  celebrate({sessionXp, base, sumXp, mult, perEx, anyPR, rankUps, leveledUp, lvlAfter, unlocked});
  render();
}

function markQuest(tier,id,done){ const q=S.quests[tier].find(x=>x.id===id); if(q){ if(done&&!q.done&&q.xp){ S.user.totalXp+=0;} q.done=done; } }
function bumpQuest(tier,id,by){ const q=S.quests[tier].find(x=>x.id===id); if(q&&q.goal!=null){ q.prog=Math.min(q.goal,(q.prog||0)+by); if(q.prog>=q.goal) q.done=true; } }

function rankBadge(rank, lg){ return `<span class="rank ${rank}${lg?' lg':''}"><span class="dot"></span>${rank}</span>`; }

// graphe sparkline du 1RM dans le temps
function chart(sessions){
  if(!sessions.length) return '<div class="empty">Pas encore de données</div>';
  const W=300,H=120,P=14;
  const vals=sessions.map(s=>s.e1rm);
  const min=Math.min(...vals), max=Math.max(...vals);
  const span=(max-min)||1;
  const n=sessions.length;
  const x=i=> P + (i/(Math.max(1,n-1)))*(W-2*P);
  const y=v=> H-P - ((v-min)/span)*(H-2*P-6);
  let line='', area=`M ${x(0)} ${H-P} `, dots='';
  sessions.forEach((s,i)=>{
    const px=x(i), py=y(s.e1rm);
    line += (i?'L':'M')+px.toFixed(1)+' '+py.toFixed(1)+' ';
    area += `L ${px.toFixed(1)} ${py.toFixed(1)} `;
    if(s.pr) dots += `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="4.5" fill="#FFC53D" stroke="#0B0D12" stroke-width="2"/>`;
  });
  area += `L ${x(n-1)} ${H-P} Z`;
  const last=sessions[n-1];
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="none" style="display:block">
    <defs>
      <linearGradient id="ga" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FF6A00" stop-opacity=".34"/>
        <stop offset="1" stop-color="#FF6A00" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${area}" fill="url(#ga)"/>
    <path d="${line}" fill="none" stroke="#FF9A3D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    <circle cx="${x(n-1).toFixed(1)}" cy="${y(last.e1rm).toFixed(1)}" r="4" fill="#FF6A00" stroke="#fff" stroke-width="1.5"/>
  </svg>`;
}

function viewQuests(){
  const labels={daily:'Journalier',weekly:'Hebdo',monthly:'Mensuel',yearly:'Annuel'};
  const tabs=Object.keys(labels).map(k=>`<button class="${k===qTab?'on':''}" data-qtab="${k}">${labels[k]}</button>`).join('');
  let body='';
  if(qTab==='monthly'){
    const m=S.mission;
    const pct=m.prog/m.goal*100;
    const diff=[1,2,3,4,5].map(i=>`<i class="${i<=m.diff?'on':''}"></i>`).join('');
    const small=S.quests.daily.concat(S.quests.weekly);
    const doneCt=small.filter(q=>q.done).length;
    body=`<div class="card mission-card">
      <div class="row between"><div class="eyebrow">Grosse mission du mois</div><span class="diff">${diff}</span></div>
      <div class="row" style="gap:13px;margin:12px 0">
        <div style="font-size:40px">${m.emoji}</div>
        <div><div style="font-size:21px;font-weight:850">${m.name}</div>
          <div class="tiny muted" style="margin-top:3px">${m.desc}</div></div>
      </div>
      <div class="row between" style="margin-bottom:7px"><span class="tiny muted">Avancement</span><span class="tiny" style="font-weight:800">${m.prog} / ${m.goal} séances</span></div>
      <div class="bar q"><i style="width:${pct}%"></i></div>
      <div class="row" style="gap:10px;margin-top:16px;flex-wrap:wrap">
        <span class="pill">🎖️ Badge : ${m.badge}</span>
        <span class="pill">🎁 ${m.reward}</span>
      </div>
      <div class="tiny muted" style="margin-top:14px">🔓 Les petites quêtes faites ouvrent la mission — ${doneCt}/${small.length} validées.</div>
    </div>`;
  } else {
    body=S.quests[qTab].map(questRow).join('') || '<div class="empty">Rien ici pour l\'instant.</div>';
  }
  return `<div class="tabs">${tabs}</div>${body}`;
}

function viewCircle(){
  const lv=Engine.levelFromXp(S.user.totalXp).level;
  const me={name:S.user.name,emoji:S.user.emoji,level:lv,
    rank:S.exercises.reduce((b,e)=>Engine.rankIdx(e.rank)>Engine.rankIdx(b)?e.rank:b,'Bronze'),
    rankEx:'meilleur exo',streak:S.user.streak,score:strengthScore(),me:true};
  const all=[...S.friends.map(f=>({...f})),me].sort((a,b)=>b.score-a.score);
  const rows=all.map((f,i)=>`<div class="friend ${f.me?'me':''}">
    <div class="pos">${i+1}</div>
    <div class="fav">${f.emoji}</div>
    <div style="flex:1;min-width:0">
      <div class="fn">${f.name} ${f.me?'<span class="pill" style="padding:2px 8px;font-size:10px">toi</span>':''}</div>
      <div class="fmeta"><span>Niv. ${f.level}</span><span class="flame">🔥${f.streak}</span><span>Force ${f.score}</span></div>
    </div>
    ${rankBadge(f.rank)}
  </div>`).join('');
  return `<div class="card tight" style="background:transparent;border:none;box-shadow:none;padding:0">
    <div class="section-h" style="margin-top:4px"><h2>Ton cercle</h2><span class="pill">${all.length} potes</span></div>
    <div class="tiny muted" style="margin:0 4px 14px">Accountability, pas anonymat. Niveau, rang et streak de chacun.</div>
    ${rows}
  </div>`;
}

function viewRewards(){
  const lv=Engine.levelFromXp(S.user.totalXp).level;
  const rows=S.rewards.map(rw=>{
    let progNote='';
    if(rw.type==='level' && !rw.unlocked) progNote=`<div class="rc">Niveau ${lv} / ${rw.lvl}</div>`;
    return `<div class="reward ${rw.unlocked?'':'locked'}">
      <div class="re">${rw.icon}</div>
      <div style="flex:1;min-width:0">
        <div class="rt">${rw.t}</div>
        <div class="rc">${rw.cond}</div>
        ${progNote}
      </div>
      <span class="rstate ${rw.unlocked?'open':'lock'}">${rw.unlocked?'🔓 Débloqué':'🔒 Verrouillé'}</span>
    </div>`;
  }).join('');
  return `
    <div class="section-h" style="margin-top:4px"><h2>Tes récompenses</h2></div>
    <div class="tiny muted" style="margin:0 4px 14px">Tu poses tes propres récompenses. Elles tombent sur un record ou une montée de niveau.</div>
    ${rows}
    <button class="btn block ghost" id="addReward" style="border:1px dashed var(--line-strong);margin-top:6px">＋ Ajouter une récompense</button>
  `;
}

/* ============================================================================
   CÉLÉBRATION (overlay + confettis)
   ============================================================================ */
function celebrate(r){
  const ov=el('overlay');
  let inner='';
  if(r.leveledUp){
    inner+=`<div class="burst">⬆️</div><h3>NIVEAU ${r.lvlAfter} !</h3><div class="tiny muted">La montée ralentit — chaque palier coûte plus cher.</div>`;
  } else if(r.anyPR){
    inner+=`<div class="burst">🏆</div><h3>NOUVEAU RECORD</h3>`;
  } else {
    inner+=`<div class="burst">💪</div><h3>Séance validée</h3>`;
  }
  r.rankUps.forEach(ru=>{
    inner+=`<div class="rankup-anim">${rankBadge(ru.from)}<span class="arrow">➜</span>${rankBadge(ru.to)}</div>
            <div class="tiny muted" style="margin-top:-6px">${ru.name} monte de rang !</div>`;
  });
  inner+=`<div class="xpbubble grad-text">+${r.sessionXp} XP</div>`;
  inner+=`<div style="text-align:left;margin-top:6px">
    <div class="ovrow"><span class="l">📋 Présence</span><span class="r">+${r.base}</span></div>`;
  r.perEx.forEach(p=>{
    const c = p.pr?'color:var(--gold)':'';
    inner+=`<div class="ovrow"><span class="l">${p.pr?'🏆':'•'} ${p.name} <span class="tiny muted">(${p.label})</span></span><span class="r" style="${c}">+${p.xp}</span></div>`;
  });
  inner+=`<div class="ovrow"><span class="l">🔥 Multiplicateur streak</span><span class="r">×${r.mult.toFixed(2)}</span></div>
    </div>`;
  r.unlocked.forEach(u=> inner+=`<div class="pill" style="margin-top:12px">🎁 Récompense débloquée : ${u.t}</div>`);
  inner+=`<button class="btn primary block" style="margin-top:18px" data-close="1">Continuer</button>`;

  ov.innerHTML=`<div class="ovcard">${inner}</div>`;
  ov.classList.add('show');
  if(r.leveledUp||r.anyPR) confetti(ov);
}

function confetti(host){
  const cols=['#FF6A00','#FF9A3D','#FFC53D','#7BE4FF','#C28BFF','#36D399'];
  for(let i=0;i<46;i++){
    const c=document.createElement('span');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=cols[i%cols.length];
    c.style.animationDuration=(1.6+Math.random()*1.4)+'s';
    c.style.animationDelay=(Math.random()*.5)+'s';
    c.style.transform=`translateY(-20px) rotate(${Math.random()*360}deg)`;
    host.appendChild(c);
  }
}

function toast(msg){
  let t=$('.toast'); if(!t){ t=document.createElement('div'); t.className='toast'; document.body.appendChild(t); }
  t.innerHTML=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1900);
}

/* ============================================================================
   ROUTEUR + NAV
   ============================================================================ */
const SCREENS={
  home:{title:'Le hub', view:viewHome},
  log:{title:'Logger une séance', view:viewLog},
  progress:{title:'Progression', view:viewProgress},
  quests:{title:'Quêtes & missions', view:viewQuests},
  circle:{title:'Le cercle', view:viewCircle},
  rewards:{title:'Récompenses', view:viewRewards},
};
let route='home';

const NAV=[
  ['home','Accueil','M3 11l9-8 9 8M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10'],
  ['progress','Progrès','M4 19V5M4 19h16M8 16l3-4 3 2 4-6'],
  ['log','Logger','FAB'],
  ['quests','Quêtes','M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11'],
  ['circle','Cercle','M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 7a4 4 0 110 8 4 4 0 010-8M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75'],
  ['rewards','Récomp.','M20 12v9H4v-9M2 7h20v5H2zM12 22V7M12 7a4 4 0 00-4-4 2.5 2.5 0 000 5M12 7a4 4 0 014-4 2.5 2.5 0 010 5'],
];
function renderNav(){
  el('nav').innerHTML=NAV.map(([id,lbl,path])=>{
    if(path==='FAB'){
      return `<button data-go="${id}" class="fab ${route===id?'on':''}">
        <span style="width:46px;height:46px;border-radius:16px;display:grid;place-items:center;margin-top:-18px;
          background:linear-gradient(135deg,var(--accent),#ff3d00);box-shadow:var(--accent-glow)">
          <svg style="width:24px;height:24px;stroke:#fff"><path d="M12 5v14M5 12h14"/></svg></span>
        <span style="margin-top:2px">${lbl}</span></button>`;
    }
    return `<button data-go="${id}" class="${route===id?'on':''}">
      <svg viewBox="0 0 24 24"><path d="${path}"/></svg>${lbl}</button>`;
  }).join('');
}

function render(){
  el('screenTitle').textContent=SCREENS[route].title;
  el('app').innerHTML=`<div class="screen active">${SCREENS[route].view()}</div>`;
  renderNav();
  if(route==='log') bindLog();
  window.scrollTo({top:0});
}
function goto(r){ route=r; render(); }

/* ---------- bindings spécifiques au logger ---------- */
function bindLog(){
  const upd=()=>{
    const w=parseFloat(el('inW').value)||0, reps=parseFloat(el('inR').value)||0;
    el('e1rmPrev').textContent = (w&&reps)? r1(Engine.e1rm(w,reps))+' kg' : '—';
  };
  ['inW','inR','inS'].forEach(id=> el(id) && el(id).addEventListener('input',upd));
  upd();
}

/* ============================================================================
   ÉVÉNEMENTS (délégation globale)
   ============================================================================ */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-go],[data-pick],[data-newx],[data-drop],[data-ptab],[data-qtab],[data-close],#addEx,#finishBtn,#nxAdd,#addReward');
  if(!t) return;

  if(t.dataset.go){ goto(t.dataset.go); return; }
  if(t.dataset.close){ el('overlay').classList.remove('show'); return; }
  if(t.dataset.pick){ logSel=t.dataset.pick; render(); return; }
  if(t.dataset.newx){ el('newx').classList.toggle('show'); return; }
  if(t.dataset.ptab){ progTab=t.dataset.ptab; render(); return; }
  if(t.dataset.qtab){ qTab=t.dataset.qtab; render(); return; }

  if(t.dataset.drop){ S.draft.splice(+t.dataset.drop,1); save(); render(); return; }

  if(t.id==='addEx'){
    const w=parseFloat(el('inW').value), reps=parseInt(el('inR').value), sets=parseInt(el('inS').value);
    if(!w||!reps||!sets){ toast('⚠️ Remplis poids, reps et séries'); return; }
    S.draft.push({exId:logSel,w,reps,sets});
    save();
    const nm=exById(logSel).name;
    render();
    toast(`✅ ${nm} ajouté · 1RM ${r1(Engine.e1rm(w,reps))} kg`);
    return;
  }
  if(t.id==='finishBtn'){ finalizeSession(); return; }

  if(t.id==='nxAdd'){
    const name=el('nxName').value.trim(); const mus=el('nxMuscle').value;
    if(!name){ toast('⚠️ Donne un nom à l\'exercice'); return; }
    const id='cust_'+Date.now();
    S.catalog.push({id,name,emoji:'⭐',muscles:[mus]});
    logSel=id; save(); render(); toast(`⭐ ${name} créé`);
    return;
  }
  if(t.id==='addReward'){
    const t1=prompt('Nom de la récompense ?'); if(!t1) return;
    const c=prompt('Condition (ex: "Au niveau 12", "À ton prochain record") ?')||'Quand tu veux';
    S.rewards.push({icon:'🎁',t:t1,cond:c,type:'manual',unlocked:false});
    save(); render(); toast('🎁 Récompense ajoutée');
    return;
  }
});
// fermer overlay en cliquant le fond
el('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') el('overlay').classList.remove('show'); });

/* ---------- boot ---------- */
load(); render();
window.APEX={S,Engine,reset(){ localStorage.removeItem('apex_v1'); load(); render(); }};
})();
</script>
